name: Deploy bokkiep to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/app/package-lock.json
      - run: npm ci
      - name: Build
        env:
          GITHUB_PAGES: "true"
          # Zet de Application (client) ID als repository-variabele 'MS_CLIENT_ID'
          # (Settings → Secrets and variables → Actions → Variables). Optioneel:
          # zonder deze waarde werkt de app lokaal, maar is OneDrive-sync uit.
          VITE_MS_CLIENT_ID: ${{ vars.MS_CLIENT_ID }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
